version: "2"
type: backend
tech_stack:
  - Python
  - Odoo 17 ORM
  - PostgreSQL
  - OWL (JavaScript)
features:
  - name: Sold To/Ship To/Bill To Tree View Toggle
    description: Add Tree/Kanban view toggle buttons on Customer form tabs for Sold To, Ship To, and Bill To addresses
    files:
      - sales/static/src/js/address_view_toggle.js
      - sales/static/src/css/address_view_toggle.css
      - sales/views/views.xml
    endpoints: []
    depends_on:
      - Customer Master Data
    known_limitations:
      - issue: Kanban view is custom-rendered from table data, not native Odoo kanban
        location: sales/static/src/js/address_view_toggle.js
        impact: Kanban view may not have full Odoo kanban features like grouping/sorting

  - name: Ship To and Bill To Selection on Sales Order
    description: Add ship_to_id and bill_to_id Many2one fields on Sales Order model and Quotation form, with auto-selection from customer addresses
    files:
      - sales/models/models.py
      - sales/views/views.xml
    endpoints: []
    depends_on:
      - Customer Master Data
      - Sold To/Ship To/Bill To Models
    known_limitations: []

  - name: Bill To Selection on Invoice
    description: Add bill_to_id Many2one field on Invoice model and form view, with address resolution logic using selected bill_to_id
    files:
      - sales/models/models.py
      - sales/views/views.xml
    endpoints: []
    depends_on:
      - Customer Master Data
      - Bill To Model
    known_limitations: []
known_limitations: []
